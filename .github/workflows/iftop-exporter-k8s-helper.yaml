name: Release iftop-exporter-k8s-helper

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "iftop-exporter-k8s-helper/**"
      - ".github/workflows/iftop-exporter-k8s-helper.yaml"

concurrency:
  group: iftop-exporter-k8s-helper-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker-release:
    name: Docker Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASS }}

      - name: Prepare image tags
        id: tags
        run: |
          SHORT_TAG=$(git describe --abbrev=5 --dirty --tags --always)
          TIME_TAG=$(TZ=UTC date +"%y%m%d%H%M%S")
          COMMIT_TAG=${GITHUB_SHA::7}
          IMAGE_TAG="${TIME_TAG}-${COMMIT_TAG}"
          {
            echo "short_tag=${SHORT_TAG}"
            echo "image_tag=${IMAGE_TAG}"
          } >> "$GITHUB_OUTPUT"
          echo "::notice title=Image tags::latest, ${IMAGE_TAG}, ${SHORT_TAG}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./iftop-exporter-k8s-helper
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            bougou/iftop-exporter-k8s-helper:latest
            bougou/iftop-exporter-k8s-helper:${{ steps.tags.outputs.image_tag }}
            bougou/iftop-exporter-k8s-helper:${{ steps.tags.outputs.short_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
